global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: vdeliere@student.42.fr
  smtp_require_tls: true

route:
  receiver: 'default'
  group_by: ['service', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 2h

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@votre-domaine.com'
  
  - name: 'critical-alerts'
    email_configs:
      - to: vdeliere@student.42.fr
    
  - name: 'warning-alerts'
    email_configs:
      - to: vdeliere@student.42.fr