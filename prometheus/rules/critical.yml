groups:
  - name: "ressources_criticals"
    rules:
      - alert: HighCPUUsageCritical
        expr: (rate(container_cpu_usage_seconds_total{name=~"auth|user|content|social|realtime|bff"}[1m]) * 100) > 90
        for: 2m
        labels:
          severity: critical
          service: "{{$labels.name}}"
        annotations:
          summary: "Utilisation critique du CPU détecté !"
          description: "Le service {{$labels.name}} utilise {{$value}}% de CPU"
      
      - alert: HighMemoryUsageCritical
        expr: (process_resident_memory_bytes{job=~"auth|user|content|social|realtime|bff"} / 1024 / 1024) > 400
        for: 2m
        labels:
          severity: critical
          service: "{{$labels.job}}"
        annotations:
          summary: "Utilisation mémoire critique !"
          description: "Le service {{$labels.job}} utilise {{$value}} MB de RAM"